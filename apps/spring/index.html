<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPCR Joint Dynamics — Three.js Demo</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #1a1a2e;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #eee;
      }
      #ui button {
        margin: 4px;
        padding: 6px 14px;
        cursor: pointer;
        border: 1px solid #555;
        background: #333;
        color: #eee;
        border-radius: 4px;
      }
      #ui button.active {
        background: #4a6fa5;
        border-color: #6a9fd5;
      }
      #info {
        position: absolute;
        bottom: 10px;
        left: 10px;
        color: #888;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="ui" style="z-index: 999">
      <button id="btn-chain">Bone Chain</button>
      <button id="btn-cloth" class="active">Cloth Grid</button>
      <button id="btn-barrel">Barrel</button>
      <button id="btn-wind">Toggle Wind</button>
      <button id="btn-reset">Reset</button>
      <span id="release-controls" style="display: none">
        <button id="btn-release-one">Release Next</button>
        <button id="btn-release-all">Release All</button>
        <button id="btn-fix-all">Fix All</button>
      </span>
    </div>
    <div
      id="status"
      style="position: absolute; top: 40px; left: 10px; color: #aaa; font-size: 12px; z-index: 999"
    ></div>
    <div id="info" style="z-index: 999">
      SPCR Joint Dynamics — TypeScript Port Demo | Left-click drag to grab bones
    </div>
    <canvas id="canvas" style="display: block; position: absolute; width: 100%; height: 100%"></canvas>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
